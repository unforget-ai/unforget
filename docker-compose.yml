services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-unforget}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unforget}
      POSTGRES_DB: ${POSTGRES_DB:-unforget}
    ports:
      - "5433:5432"
    volumes:
      - unforget-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unforget"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  unforget-data:
